[board]
hostname=S360ptf
role=ptf

[hardware]
ptf_camera=QHY183c

[startup]
controller=main_controller.py

[module:ptf_camera]
exec=python3 bin/ptf_camera.py
startup_timeout_ms=30000

[module:ptf_control]
exec=python3 bin/ptf_control.py

[module:ptf_tracker]
exec=python3 bin/ptf_tracker.py

[module:archive]
exec=python3 bin/archive.py

