[board]
hostname=S360asc
role=asc

[hardware]
asc_camera=QHY183c

[startup]
controller=main_controller.py

[module:asc_camera]
exec=python3 bin/asc_camera.py
startup_timeout_ms=30000

[module:asc_bgs_vibe]
exec=python3 bin/asc_bgs_vibe.py

[module:asc_bgs_gmm]
exec=python3 bin/asc_bgs_gmm.py

[module:asc_bgs_2diff]
exec=python3 bin/asc_bgs_2diff.py

[module:asc_blobdetect]
exec=python3 bin/asc_blobdetect.py

[module:asc_tracker]
exec=python3 bin/asc_tracker.py

[module:archive]
exec=python3 bin/archive.py
