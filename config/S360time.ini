[board]
hostname=S360time
role=mcp

[hardware]
gps=/dev/ttyACM0
pps=/dev/pps0

[startup]
controller=mcp.py

[module:gps]
exec=python3 bin/gps_monitor.py

[module:time]
exec=python3 bin/time_ns.py

[module:mcp]
exec=python3 bin/mcp.py
startup_timeout_ms=10000

[module:adsb]
exec=python3 bin/adsb_monitor.py

[module:eph]
exec=python3 bin/eph_monitor.py

[module:web]
exec=python3 bin/webservice.py

[module:archive]
exec=python3 bin/archive.py
